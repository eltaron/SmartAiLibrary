groups:
  - name: ai_services_alerts
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"

      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p99 latency on {{ $labels.service }}"

      - alert: RecommendationCacheHitLow
        expr: rate(rec_cache_hits_total[5m]) / rate(rec_requests_total[5m]) < 0.30
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Recommendation cache hit rate below 30%"

      - alert: PineconeQueryLatencyHigh
        expr: histogram_quantile(0.99, rate(search_latency_seconds_bucket[5m])) > 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pinecone ANN query p99 > 100ms"

      - alert: KafkaConsumerLagHigh
        expr: kafka_consumer_lag{group="embedding-service"} > 5000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Embedding backlog > 5,000 chunks"

      - alert: HighErrorRate
        expr: rate(errors_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.service }}"